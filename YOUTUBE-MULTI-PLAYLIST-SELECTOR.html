<style>
  /* widget container to avoid style bleed */
  #menoraWidget { font-family: "Trebuchet MS", Arial, sans-serif; color: #222; max-width:900px; margin:1px auto; padding:2px; }

  /* player box */
  #menoraPlayerWrap { background:#fff; border-radius:2px; overflow:hidden; box-shadow:0 4px 18px rgba(0,0,0,0.08); }

  iframe#menoraPlayer { width:100%; height:360px; border:0; display:block; }

  /* selects */
  .menora-select { width:100%; max-width:900px; box-sizing:border-box; padding:10px; margin-top:8px; border-radius:2px; border:0px solid #cfcfcf; background:#fff; font-size:16px; color:#111; }

  /* Modal background */
  #menoraModalBg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:99999; align-items:center; justify-content:center; padding:18px; }

  /* Modal box */
  #menoraModalBox { width:100%; max-width:720px; background:#fff; border-radius:2px; box-shadow:0 12px 40px rgba(0,0,0,0.35); overflow:hidden; }

  #menoraModalHeader { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid #eee; background:linear-gradient(90deg,#f7f7f7,#fff); }
  #menoraModalHeader h3 { margin:0; font-size:1rem; color:#00643c; letter-spacing:0.6px; }

  #menoraModalClose { background:none; border:0; font-size:20px; cursor:pointer; color:#666; }

  #menoraModalList { max-height:80vh; overflow:auto; padding:8px 12px; }
  .menoraVideoCard { padding:12px 10px; border-bottom:1px solid #e6e6e6; display:flex; gap:12px; align-items:center; cursor:pointer; }
  .menoraVideoThumb { width:110px; min-width:110px; height:62px; background:#ddd; border-radius:2px; overflow:hidden; display:flex; align-items:center; justify-content:center; }
  .menoraVideoInfo { flex:1; font-size:0.95em; color:#111; }
  .menoraVideoTitle { margin:0 0 4px 0; font-weight:600; font-size:0.95em; color:#222; }
  .menoraVideoMeta { font-size:0.82em; color:#666; }

  .menoraVideoCard:hover { background:#fafafa; }

  @media (max-width:520px) {
    iframe#menoraPlayer { height:315px; }
    .menoraVideoThumb { width:96px; height:56px; min-width:96px; }
  }
</style>

/* DOM refs */
const channelSelect = document.getElementById('menoraChannelSelect');
const playlistSelect = document.getElementById('menoraPlaylistSelect');
const playerFrame = document.getElementById('menoraPlayer');
const modalBg = document.getElementById('menoraModalBg');
const modalList = document.getElementById('menoraModalList');
const modalClose = document.getElementById('menoraModalClose');

/* Hide widget on non-homepage */
(function guardHomepage() {
  const path = window.location.pathname || '/';
  if (!(path === '/' || path.endsWith('/index.html'))) {
    document.getElementById('menoraWidget').style.display = 'none';
  }
})();

/* Populate channel select */
(function populateChannels() {
  for (const key in channels) {
    const opt = document.createElement('option');
    opt.value = key;
    opt.textContent = channels[key].name;
    channelSelect.appendChild(opt);
  }
})();

/* Channel change → load playlists */
channelSelect.addEventListener('change', () => {
  const key = channelSelect.value;
  playlistSelect.innerHTML = '<option value="">— SELECT PLAYLIST —</option>';
  playlistSelect.disabled = true;
  if (!key) return;

  const pls = channels[key].playlists;
  for (const name in pls) {
    const o = document.createElement('option');
    o.value = pls[name];
    o.textContent = name;
    playlistSelect.appendChild(o);
  }
  playlistSelect.disabled = false;
});

/* Playlist change → fetch ALL videos using API v3 */
/* Playlist change → fetch ALL videos using API v3 */
playlistSelect.addEventListener('change', async () => {

  const playlistId = playlistSelect.value;
  if (!playlistId) return;

  openModal();

  modalList.innerHTML =
    '<div style="padding:14px; text-align:center; color:#777;">Loading videos…</div>';

  try {

    let allItems = [];
    let pageToken = "";

    do {

      const apiUrl =
        `https://www.googleapis.com/youtube/v3/playlistItems` +
        `?part=snippet` +
        `&playlistId=${playlistId}` +
        `&maxResults=50` +
        (pageToken ? `&pageToken=${pageToken}` : '') +
        `&key=${API_KEY}`;

      const res = await fetch(apiUrl);
      const data = await res.json();

      if (data.items) {
        allItems.push(...data.items);
      }

      pageToken = data.nextPageToken || "";

    } while (pageToken);

    document.querySelector('#menoraModalHeader h3')
      .textContent =
      `SELECT A VIDEO (${allItems.length} Videos)`;

    if (allItems.length === 0) {

      modalList.innerHTML =
        '<div style="padding:20px; text-align:center; color:#777;">No videos found in this playlist.</div>';

      return;
    }

    modalList.innerHTML = '';

    allItems.forEach(item => {

      if (
        !item.snippet ||
        !item.snippet.resourceId ||
        !item.snippet.resourceId.videoId
      ) return;

      const vid = item.snippet.resourceId.videoId;
      const title = item.snippet.title;

      const thumb =
        item.snippet.thumbnails?.medium?.url ||
        item.snippet.thumbnails?.default?.url ||
        '';

      const published = item.snippet.publishedAt;

      const card = document.createElement('div');
      card.className = 'menoraVideoCard';

      const thumbDiv = document.createElement('div');
      thumbDiv.className = 'menoraVideoThumb';

      const img = document.createElement('img');
      img.src = thumb;
      img.alt = title;
      img.loading = 'lazy';
      img.style.width = '100%';
      img.style.height = '100%';
      img.style.objectFit = 'cover';

      thumbDiv.appendChild(img);

      const info = document.createElement('div');
      info.className = 'menoraVideoInfo';

      const t = document.createElement('p');
      t.className = 'menoraVideoTitle';
      t.textContent = title;

      const meta = document.createElement('div');
      meta.className = 'menoraVideoMeta';
      meta.textContent =
        new Date(published).toLocaleDateString();

      info.appendChild(t);
      info.appendChild(meta);

      card.appendChild(thumbDiv);
      card.appendChild(info);

      card.addEventListener('click', () => {
        playInPlayer(vid);
        closeModal();
      });

      modalList.appendChild(card);

    });

  } catch (e) {

    console.error(e);

    modalList.innerHTML =
      '<div style="padding:18px; text-align:center; color:#900;">⚠️ Failed to load videos.</div>';

  }

});

/* Modal controls */
function openModal() {
  modalBg.style.display = 'flex';
  modalBg.style.opacity = '0';
  setTimeout(() => modalBg.style.opacity = '1', 10);
}

function closeModal() {

  modalBg.style.opacity = '0';

  setTimeout(() => {

    modalBg.style.display = 'none';

    document.querySelector('#menoraModalHeader h3')
      .textContent = 'SELECT A VIDEO';

  }, 200);

}

modalClose.addEventListener('click', closeModal);
modalBg.addEventListener('click', e => {
  if (e.target === modalBg) closeModal();
});

/* Play in main iframe */
function playInPlayer(videoId) {
  playerFrame.src = `https://www.youtube.com/embed/${videoId}?rel=0`;
  window.scrollTo({
    top: document.getElementById('menoraPlayerWrap').offsetTop - 10,
    behavior: 'smooth'
  });
}

/* =========================
   AUTO-LOAD FIRST VIDEO (API V3)
========================= */
(async function loadFirstVideo() {
  try {
    const firstChannelKey = Object.keys(channels)[0];
    const firstChannel = channels[firstChannelKey];
    const firstPlaylistId = Object.values(firstChannel.playlists)[0];

    const apiUrl =
      `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${firstPlaylistId}&maxResults=1&key=${API_KEY}`;

    const res = await fetch(apiUrl);
    const data = await res.json();

    if (data.items && data.items.length > 0) {
      const latestVideoId = data.items[0].snippet.resourceId.videoId;
      playerFrame.src =
        `https://www.youtube.com/embed/${latestVideoId}?rel=0`;
    }
  } catch (err) {
    console.warn("Auto-load failed:", err);
  }
})();
